<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>yt-dlp Downloader</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@400;600&display=swap');

  :root {
    --bg:           #f5f5f0;
    --surface:      #ffffff;
    --border:       #d8d8d0;
    --accent:       #1a1a2e;
    --accent-light: #e8e8f8;
    --tidal:        #00595e;
    --tidal-light:  #e0f4f5;
    --green:        #1a7a4a;
    --green-bg:     #e8f5ee;
    --red:          #b91c1c;
    --red-bg:       #fef2f2;
    --text:         #1a1a1a;
    --muted:        #888880;
    --mono: 'IBM Plex Mono', monospace;
    --sans: 'IBM Plex Sans', sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    font-family: var(--sans);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 3rem 1rem 4rem;
  }

  .wrap { width: 100%; max-width: 960px; }

  header { margin-bottom: 2rem; display: flex; align-items: flex-end; justify-content: space-between; gap: 1rem; }
  .header-left { border-left: 3px solid var(--accent); padding-left: 1rem; }
  h1 { font-family: var(--mono); font-size: 1.4rem; font-weight: 600; letter-spacing: -.02em; color: var(--accent); }
  .sub { font-family: var(--mono); font-size: .72rem; color: var(--muted); margin-top: .25rem; }

  .btn-update {
    background: var(--bg); border: 1px solid var(--border); border-radius: 6px;
    padding: .45rem .8rem; font-family: var(--mono); font-size: .72rem; font-weight: 600;
    color: var(--muted); cursor: pointer; transition: all .15s; white-space: nowrap;
  }
  .btn-update:hover { border-color: var(--accent); color: var(--text); }

  .layout { display: grid; grid-template-columns: 1fr 320px; gap: 1rem; align-items: start; }
  @media (max-width: 720px) { .layout { grid-template-columns: 1fr; } }

  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 1.5rem; margin-bottom: 1rem; transition: border-color .2s; }
  .card.tidal-mode { border-color: var(--tidal); }

  .field { margin-bottom: 1.1rem; }
  .field:last-child { margin-bottom: 0; }

  label {
    display: block; font-family: var(--mono); font-size: .65rem; font-weight: 600;
    letter-spacing: .08em; text-transform: uppercase; color: var(--muted); margin-bottom: .45rem;
  }

  input[type="url"], input[type="text"], input[type="search"] {
    width: 100%; border: 1px solid var(--border); border-radius: 6px; padding: .65rem .875rem;
    font-family: var(--mono); font-size: .85rem; color: var(--text); background: var(--bg);
    outline: none; transition: border-color .15s, box-shadow .15s;
  }
  input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-light); }
  input::placeholder { color: var(--muted); }

  /* Mode */
  .mode-row { display: flex; gap: .4rem; margin-bottom: 1.1rem; }
  .mode-btn {
    flex: 1; padding: .5rem .4rem; background: var(--bg); border: 1px solid var(--border);
    border-radius: 6px; font-family: var(--mono); font-size: .72rem; font-weight: 600;
    color: var(--muted); cursor: pointer; text-align: center; transition: all .15s;
  }
  .mode-btn:hover { border-color: var(--accent); color: var(--text); }
  .mode-btn.active[data-mode="auto"]  { border-color: var(--accent); background: var(--accent); color: #fff; }
  .mode-btn.active[data-mode="tidal"] { border-color: var(--tidal);  background: var(--tidal);  color: #fff; }
  .mode-btn.active[data-mode="ytdlp"] { border-color: var(--red);    background: var(--red);    color: #fff; }

  .mode-desc {
    font-family: var(--mono); font-size: .65rem; color: var(--muted); margin-bottom: 1.1rem;
    padding: .45rem .7rem; background: var(--bg); border-radius: 6px;
    border-left: 3px solid var(--border); transition: all .2s;
  }
  .mode-desc.tidal-mode { border-color: var(--tidal); color: var(--tidal); background: var(--tidal-light); }

  /* Quality */
  .quality-wrap { display: none; margin-bottom: 1.1rem; }
  .quality-wrap.visible { display: block; }
  .quality-row { display: flex; gap: .35rem; }
  .quality-btn {
    flex: 1; padding: .38rem .3rem; background: var(--bg); border: 1px solid var(--border);
    border-radius: 6px; font-family: var(--mono); font-size: .67rem; font-weight: 600;
    color: var(--muted); cursor: pointer; text-align: center; transition: all .15s;
  }
  .quality-btn:hover { border-color: var(--tidal); color: var(--text); }
  .quality-btn.active { border-color: var(--tidal); background: var(--tidal); color: #fff; }

  /* Folder grid */
  .dir-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: .4rem; min-height: 38px; }
  .dir-btn {
    background: var(--bg); border: 1px solid var(--border); border-radius: 6px;
    padding: .45rem .5rem; font-family: var(--mono); font-size: .72rem; color: var(--muted);
    cursor: pointer; text-align: center; transition: all .15s;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .dir-btn:hover { border-color: var(--accent); color: var(--text); }
  .dir-btn.active { border-color: var(--accent); background: var(--accent); color: #fff; }
  .dir-loading { font-family: var(--mono); font-size: .7rem; color: var(--muted); padding: .5rem 0; font-style: italic; }

  button.primary {
    width: 100%; margin-top: 1.25rem; padding: .75rem 1rem; background: var(--accent);
    color: #fff; border: none; border-radius: 6px; font-family: var(--mono);
    font-size: .85rem; font-weight: 600; cursor: pointer; letter-spacing: .02em;
    transition: background .2s, opacity .15s, transform .1s;
  }
  button.primary.tidal-mode { background: var(--tidal); }
  button.primary.ytdlp-mode { background: var(--red); }
  button.primary:hover { opacity: .88; }
  button.primary:active { transform: scale(.99); }
  button.primary:disabled { opacity: .4; cursor: not-allowed; }

  /* Search results */
  .results-panel { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; margin-bottom: 1rem; display: none; }
  .results-panel.show { display: block; }
  .results-header {
    padding: .55rem 1rem; font-family: var(--mono); font-size: .65rem; font-weight: 600;
    letter-spacing: .08em; text-transform: uppercase; color: var(--muted);
    border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between;
  }
  .results-close { background: transparent; border: none; color: var(--muted); cursor: pointer; font-size: .85rem; }
  .result-item {
    display: flex; align-items: center; gap: .75rem; padding: .7rem 1rem;
    border-bottom: 1px solid var(--border); cursor: pointer; transition: background .12s;
  }
  .result-item:last-child { border-bottom: none; }
  .result-item:hover { background: var(--bg); }
  .result-info { flex: 1; min-width: 0; }
  .result-title { font-family: var(--sans); font-size: .85rem; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .result-artist { font-family: var(--mono); font-size: .7rem; color: var(--muted); margin-top: .08rem; }
  .result-duplicate { font-family: var(--mono); font-size: .6rem; color: var(--red); margin-top: .12rem; }
  .result-meta { font-family: var(--mono); font-size: .68rem; color: var(--muted); text-align: right; flex-shrink: 0; }
  .result-meta .size { color: var(--text); font-weight: 600; }

  /* Side panels */
  .side-panel { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; margin-bottom: 1rem; }
  .side-header {
    padding: .55rem .875rem; font-family: var(--mono); font-size: .65rem; font-weight: 600;
    letter-spacing: .08em; text-transform: uppercase; color: var(--muted);
    border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between;
  }
  .side-body { max-height: 260px; overflow-y: auto; }
  .side-body::-webkit-scrollbar { width: 4px; }
  .side-body::-webkit-scrollbar-track { background: transparent; }
  .side-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .track-count { background: var(--border); border-radius: 10px; padding: .1rem .4rem; font-size: .6rem; }
  .track-item { padding: .28rem .75rem; font-family: var(--mono); font-size: .7rem; color: var(--text); line-height: 1.4; word-break: break-word; }
  .track-empty, .track-loading { padding: .75rem; font-family: var(--mono); font-size: .7rem; color: var(--muted); text-align: center; font-style: italic; }

  /* Queue */
  .queue-item {
    display: flex; align-items: center; gap: .6rem; padding: .6rem .875rem;
    border-bottom: 1px solid var(--border); font-family: var(--mono); font-size: .72rem;
  }
  .queue-item:last-child { border-bottom: none; }
  .queue-label { flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--text); }
  .queue-badge { font-size: .6rem; font-weight: 600; padding: .12rem .4rem; border-radius: 4px; flex-shrink: 0; text-transform: uppercase; }
  .queue-badge.active  { background: var(--tidal-light); color: var(--tidal); }
  .queue-badge.queued  { background: var(--accent-light); color: var(--accent); }
  .queue-remove { background: transparent; border: none; color: var(--muted); cursor: pointer; font-size: .75rem; flex-shrink: 0; padding: 0 .2rem; }
  .queue-remove:hover { color: var(--red); }
  .queue-empty { padding: .75rem; font-family: var(--mono); font-size: .7rem; color: var(--muted); text-align: center; font-style: italic; }

  /* History */
  .history-item { padding: .55rem .875rem; border-bottom: 1px solid var(--border); font-family: var(--mono); font-size: .7rem; }
  .history-item:last-child { border-bottom: none; }
  .history-title { color: var(--text); font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .history-meta { color: var(--muted); font-size: .62rem; margin-top: .1rem; }
  .history-empty { padding: .75rem; font-family: var(--mono); font-size: .7rem; color: var(--muted); text-align: center; font-style: italic; }

  /* Terminal */
  .terminal { background: var(--accent); border-radius: 8px; overflow: hidden; display: none; margin-bottom: 1rem; }
  .terminal.show { display: block; }
  .t-bar { background: rgba(255,255,255,.07); padding: .5rem 1rem; display: flex; align-items: center; gap: .75rem; }
  .t-title { font-family: var(--mono); font-size: .68rem; color: rgba(255,255,255,.45); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .btn-cancel {
    background: transparent; border: 1px solid rgba(255,255,255,.25); color: rgba(255,255,255,.6);
    border-radius: 4px; padding: .18rem .5rem; font-family: var(--mono); font-size: .65rem; cursor: pointer; transition: all .15s; flex-shrink: 0;
  }
  .btn-cancel:hover { border-color: rgba(255,100,100,.6); color: rgba(255,150,150,1); }
  .t-body {
    padding: .75rem 1rem 1rem; max-height: 280px; overflow-y: auto; font-family: var(--mono);
    font-size: .74rem; line-height: 1.75; color: rgba(255,255,255,.55); white-space: pre-wrap; word-break: break-all;
  }
  .t-body::-webkit-scrollbar { width: 4px; }
  .t-body::-webkit-scrollbar-track { background: transparent; }
  .t-body::-webkit-scrollbar-thumb { background: rgba(255,255,255,.15); border-radius: 2px; }
  .ll { animation: fl .12s ease both; }
  @keyframes fl { from { opacity:0; } to { opacity:1; } }
  .ll.ok  { color: #6ee7a0; }
  .ll.err { color: #fca5a5; }
  .ll.inf { color: #93c5fd; }

  /* Status */
  .status { font-family: var(--mono); font-size: .75rem; padding: .55rem .875rem; border-radius: 6px; display: none; margin-bottom: 1rem; }
  .status.show    { display: block; }
  .status.running { background: var(--accent-light); color: var(--accent); }
  .status.done    { background: var(--green-bg);     color: var(--green); }
  .status.error   { background: var(--red-bg);       color: var(--red); }

  .link-btn { background: none; border: none; color: var(--muted); font-family: var(--mono); font-size: .62rem; cursor: pointer; text-decoration: underline; padding: 0; }
  .link-btn:hover { color: var(--red); }

  footer { margin-top: 1.5rem; font-family: var(--mono); font-size: .62rem; color: var(--muted); text-align: center; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="header-left">
      <h1>yt-dlp downloader</h1>
      <div class="sub">yt-dlp · Tidal (hifi-api) · Nextcloud Sync</div>
    </div>
    <button class="btn-update" onclick="runUpdate()">⟳ Update yt-dlp</button>
  </header>

  <div class="layout">
    <!-- LEFT -->
    <div>
      <div class="card" id="main-card">
        <div class="field">
          <label>Mode</label>
          <div class="mode-row" id="mode-row">
            <button class="mode-btn active" data-mode="auto">⚡ Auto</button>
            <button class="mode-btn" data-mode="tidal">🎵 Tidal</button>
            <button class="mode-btn" data-mode="ytdlp">▶ yt-dlp</button>
          </div>
          <div class="mode-desc" id="mode-desc"></div>
        </div>

        <div class="quality-wrap" id="quality-wrap">
          <label>Quality (Tidal)</label>
          <div class="quality-row">
            <button class="quality-btn" data-quality="HI_RES_LOSSLESS">Hi-Res</button>
            <button class="quality-btn active" data-quality="LOSSLESS">FLAC</button>
            <button class="quality-btn" data-quality="HIGH">AAC 320</button>
            <button class="quality-btn" data-quality="LOW">AAC 96</button>
          </div>
        </div>

        <div class="field">
          <label id="url-label">YouTube URL</label>
          <input type="url" id="url" placeholder="https://www.youtube.com/watch?v=…" autocomplete="off" spellcheck="false">
        </div>

        <div class="field">
          <label>Target Folder</label>
          <div class="dir-grid" id="dir-grid">
            <span class="dir-loading">Loading folders…</span>
          </div>
        </div>

        <button class="primary" id="dl-btn" onclick="go()">⬇ Start Download</button>
      </div>

      <div class="results-panel" id="results-panel">
        <div class="results-header">
          <span id="results-title">Search Results</span>
          <button class="results-close" onclick="closeResults()">✕</button>
        </div>
        <div id="results-list"></div>
      </div>

      <div class="status" id="status"></div>
      <div class="terminal" id="term">
        <div class="t-bar">
          <span class="t-title" id="t-label">output</span>
          <button class="btn-cancel" onclick="abortCurrent()">■ Cancel</button>
        </div>
        <div class="t-body" id="t-body"></div>
      </div>
    </div>

    <!-- RIGHT -->
    <div>
      <div class="side-panel">
        <div class="side-header">
          <span id="folder-label">Tracks</span>
          <span class="track-count" id="track-count">—</span>
        </div>
        <div class="side-body" id="tracklist-body">
          <div class="track-loading">Loading…</div>
        </div>
      </div>

      <div class="side-panel">
        <div class="side-header">
          <span>Queue</span>
          <span class="track-count" id="queue-count">0</span>
        </div>
        <div class="side-body" id="queue-body">
          <div class="queue-empty">Empty</div>
        </div>
      </div>

      <div class="side-panel">
        <div class="side-header">
          <span>History</span>
          <button class="link-btn" onclick="clearHistory()">Clear</button>
        </div>
        <div class="side-body" id="history-body">
          <div class="history-empty">No downloads yet</div>
        </div>
      </div>
    </div>
  </div>

  <footer>localhost:5000</footer>
</div>

<script>
  let currentJobId = null, currentEvt = null;
  let musikDir        = '/musik';
  let selectedDir     = '';
  let selectedMode    = 'auto';
  let selectedQuality = 'LOSSLESS';

  const modeConfig = {
    auto:  { desc: 'Auto: fetch YouTube title → search Tidal → pick from top 5 → yt-dlp fallback', urlLabel: 'YouTube URL',  placeholder: 'https://www.youtube.com/watch?v=…', inputType: 'url',    btnText: '⬇ Search & Download', quality: true,  tidal: false },
    tidal: { desc: 'Tidal: search directly and download as FLAC',                                   urlLabel: 'Tidal Search', placeholder: 'Artist – Title …',                inputType: 'search', btnText: '🎵 Search Tidal',      quality: true,  tidal: true  },
    ytdlp: { desc: 'yt-dlp: download directly from YouTube or other platforms as Opus',             urlLabel: 'URL',          placeholder: 'https://…',                       inputType: 'url',    btnText: '▶ Download with yt-dlp', quality: false, tidal: false },
  };

  // ── Init ─────────────────────────────────────────────────────────────────────
  fetch('/api/config').then(r => r.json()).then(cfg => {
    musikDir = cfg.musik_dir.replace(/\/+$/, '');
    loadFolders();
  });

  applyMode();
  loadHistory();
  setInterval(pollQueue, 2000);

  // ── Folders (dynamic) ─────────────────────────────────────────────────────────
  async function loadFolders() {
    const grid = document.getElementById('dir-grid');
    try {
      const res  = await fetch('/api/folders');
      const data = await res.json();
      if (!data.folders || !data.folders.length) {
        grid.innerHTML = '<span class="dir-loading">No folders found</span>';
        return;
      }
      grid.innerHTML = '';
      data.folders.forEach((folder, i) => {
        const btn = document.createElement('button');
        btn.className   = 'dir-btn' + (i === 0 ? ' active' : '');
        btn.textContent = folder;
        btn.title       = folder;
        btn.dataset.folder = folder;
        btn.addEventListener('click', () => selectFolder(btn, folder));
        grid.appendChild(btn);
      });
      // Select first folder
      const first = data.folders[0];
      selectedDir = musikDir + '/' + first;
      document.getElementById('folder-label').textContent = first;
      loadTracks(selectedDir);
    } catch {
      grid.innerHTML = '<span class="dir-loading">Failed to load folders</span>';
    }
  }

  function selectFolder(btn, folder) {
    document.querySelectorAll('.dir-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    selectedDir = musikDir + '/' + folder;
    document.getElementById('folder-label').textContent = folder;
    loadTracks(selectedDir);
  }

  // ── Mode ─────────────────────────────────────────────────────────────────────
  document.getElementById('mode-row').addEventListener('click', e => {
    const btn = e.target.closest('.mode-btn');
    if (!btn) return;
    selectedMode = btn.dataset.mode;
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    applyMode();
    closeResults();
  });

  function applyMode() {
    const cfg   = modeConfig[selectedMode];
    const card  = document.getElementById('main-card');
    const desc  = document.getElementById('mode-desc');
    const lbl   = document.getElementById('url-label');
    const inp   = document.getElementById('url');
    const dlBtn = document.getElementById('dl-btn');
    const qwrap = document.getElementById('quality-wrap');
    desc.textContent  = cfg.desc;
    lbl.textContent   = cfg.urlLabel;
    inp.placeholder   = cfg.placeholder;
    inp.type          = cfg.inputType;
    dlBtn.textContent = cfg.btnText;
    qwrap.classList.toggle('visible', cfg.quality);
    card.className  = 'card' + (cfg.tidal ? ' tidal-mode' : '');
    desc.className  = 'mode-desc' + (cfg.tidal ? ' tidal-mode' : '');
    dlBtn.className = 'primary' + (cfg.tidal ? ' tidal-mode' : selectedMode === 'ytdlp' ? ' ytdlp-mode' : '');
  }

  // ── Quality ───────────────────────────────────────────────────────────────────
  document.querySelector('.quality-row').addEventListener('click', e => {
    const btn = e.target.closest('.quality-btn');
    if (!btn) return;
    document.querySelectorAll('.quality-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    selectedQuality = btn.dataset.quality;
  });

  // ── Tracklist ─────────────────────────────────────────────────────────────────
  async function loadTracks(path) {
    const body  = document.getElementById('tracklist-body');
    const count = document.getElementById('track-count');
    body.innerHTML = '<div class="track-loading">Loading…</div>';
    count.textContent = '—';
    try {
      const res  = await fetch('/api/files?path=' + encodeURIComponent(path));
      const data = await res.json();
      if (!data.files || !data.files.length) {
        body.innerHTML = '<div class="track-empty">No tracks found</div>';
        count.textContent = '0'; return;
      }
      count.textContent = data.files.length;
      body.innerHTML = data.files.map(f => `<div class="track-item">${f}</div>`).join('');
    } catch { body.innerHTML = '<div class="track-empty">Error loading</div>'; }
  }

  // ── Status / Log ──────────────────────────────────────────────────────────────
  function setStatus(cls, txt) {
    const el = document.getElementById('status');
    if (!cls) { el.className = 'status'; el.textContent = ''; return; }
    el.className = 'status show ' + cls;
    el.textContent = txt;
  }

  function log(txt, cls='') {
    const b = document.getElementById('t-body');
    const d = document.createElement('div');
    d.className = 'll' + (cls ? ' '+cls : '');
    d.textContent = txt;
    b.appendChild(d);
    b.scrollTop = b.scrollHeight;
  }

  function clearLog() {
    document.getElementById('t-body').innerHTML = '';
    document.getElementById('term').className = 'terminal show';
  }

  // ── Search results ────────────────────────────────────────────────────────────
  function closeResults() {
    document.getElementById('results-panel').classList.remove('show');
    document.getElementById('results-list').innerHTML = '';
  }

  function showResults(tracks, quality) {
    const list = document.getElementById('results-list');
    document.getElementById('results-title').textContent =
      `${tracks.length} result${tracks.length !== 1 ? 's' : ''} on Tidal`;
    list.innerHTML = '';
    tracks.forEach(t => {
      const item = document.createElement('div');
      item.className = 'result-item';
      item.innerHTML = `
        <div class="result-info">
          <div class="result-title">${t.title}</div>
          <div class="result-artist">${t.artist}</div>
          ${t.existing ? `<div class="result-duplicate">⚠ Already exists: ${t.existing}</div>` : ''}
        </div>
        <div class="result-meta">
          <div>${t.duration}</div>
          <div class="size">${t.size_mb} MB</div>
        </div>`;
      item.addEventListener('click', () => addToQueue({
        mode: 'tidal', output_dir: selectedDir, quality: quality || selectedQuality,
        track_id: t.id, track_title: t.title, track_artist: t.artist,
        label: `${t.artist} – ${t.title}`,
      }));
      list.appendChild(item);
    });
    document.getElementById('results-panel').classList.add('show');
  }

  // ── Main go ───────────────────────────────────────────────────────────────────
  async function go() {
    const input = document.getElementById('url').value.trim();
    if (!input) { alert('Please enter a URL or search query.'); return; }
    if (!selectedDir) { alert('Please wait for folders to load.'); return; }

    if (selectedMode === 'ytdlp') {
      addToQueue({ mode: 'ytdlp', url: input, output_dir: selectedDir, quality: selectedQuality, label: input });
      return;
    }

    closeResults();
    document.getElementById('dl-btn').disabled = true;
    setStatus('running', '🔍 Searching…');

    const res = await fetch('/api/search', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ mode: selectedMode, query: input, quality: selectedQuality, output_dir: selectedDir })
    });

    const reader  = res.body.getReader();
    const decoder = new TextDecoder();
    let buf = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += decoder.decode(value, { stream: true });
      const lines = buf.split('\n'); buf = lines.pop();
      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        let m; try { m = JSON.parse(line.slice(6)); } catch { continue; }
        if (m.type === 'status') {
          setStatus('running', m.text);
        } else if (m.type === 'fallback') {
          setStatus('', '');
          document.getElementById('dl-btn').disabled = false;
          addToQueue({ mode: selectedMode, url: input, output_dir: selectedDir, quality: selectedQuality, label: input });
          return;
        } else if (m.type === 'error') {
          document.getElementById('dl-btn').disabled = false;
          setStatus('error', m.text); return;
        } else if (m.type === 'results') {
          document.getElementById('dl-btn').disabled = false;
          setStatus('', '');
          showResults(m.tracks, m.quality);
        }
      }
    }
    document.getElementById('dl-btn').disabled = false;
  }

  // ── Queue ─────────────────────────────────────────────────────────────────────
  async function addToQueue(item) {
    closeResults();
    const res  = await fetch('/api/queue/add', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(item)
    });
    const data = await res.json();
    if (data.error) { setStatus('error', data.error); return; }
    setStatus('running', `✓ Added to queue (position ${data.position})`);
    pollQueue();
    listenToJob(data.job_id, item.label || 'Download');
  }

  async function removeFromQueue(jobId) {
    await fetch('/api/cancel/' + jobId, { method: 'POST' });
    pollQueue();
  }

  async function pollQueue() {
    try {
      const res  = await fetch('/api/queue');
      const data = await res.json();
      renderQueue(data.active, data.pending);
    } catch {}
  }

  function renderQueue(active, pending) {
    const body  = document.getElementById('queue-body');
    const count = document.getElementById('queue-count');
    const total = pending.length + (active && active.job_id ? 1 : 0);
    count.textContent = total;
    if (!total) { body.innerHTML = '<div class="queue-empty">Empty</div>'; return; }
    let html = '';
    if (active && active.job_id) {
      const lbl = active.track_title ? `${active.track_artist} – ${active.track_title}` : (active.label || active.url || 'Download');
      html += `<div class="queue-item"><span class="queue-label" title="${lbl}">${lbl}</span><span class="queue-badge active">Active</span></div>`;
    }
    pending.forEach(item => {
      const lbl = item.track_title ? `${item.track_artist} – ${item.track_title}` : (item.label || item.url || 'Download');
      html += `<div class="queue-item"><span class="queue-label" title="${lbl}">${lbl}</span><span class="queue-badge queued">Waiting</span><button class="queue-remove" onclick="removeFromQueue('${item.job_id}')" title="Remove">✕</button></div>`;
    });
    body.innerHTML = html;
  }

  // ── Job stream ────────────────────────────────────────────────────────────────
  function listenToJob(jobId, label) {
    clearLog();
    document.getElementById('t-label').textContent = label;
    setStatus('running', '⏳ In queue…');
    if (currentEvt) currentEvt.close();
    currentJobId = jobId;
    currentEvt   = new EventSource('/api/stream/' + jobId);
    currentEvt.onmessage = e => {
      const m = JSON.parse(e.data);
      if (m.type === 'log')   log(m.text);
      if (m.type === 'done')  { log(m.text, 'ok'); setStatus('done', '✅ Done!'); }
      if (m.type === 'error') { log(m.text, 'err'); setStatus('error', 'Error.'); }
      if (m.type === 'end')   { currentEvt.close(); currentEvt = null; currentJobId = null; loadTracks(selectedDir); loadHistory(); pollQueue(); }
    };
    currentEvt.onerror = () => { log('Connection lost.', 'err'); setStatus('error', 'Connection error.'); currentEvt = null; currentJobId = null; };
  }

  async function abortCurrent() {
    if (!currentJobId) return;
    await fetch('/api/cancel/' + currentJobId, { method: 'POST' });
    log('⚠ Cancelled.', 'err'); setStatus('error', 'Cancelled.');
    if (currentEvt) { currentEvt.close(); currentEvt = null; }
    currentJobId = null; pollQueue();
  }

  // ── History ───────────────────────────────────────────────────────────────────
  async function loadHistory() {
    try {
      const res  = await fetch('/api/history');
      const data = await res.json();
      renderHistory(data.entries || []);
    } catch {}
  }

  function renderHistory(entries) {
    const body = document.getElementById('history-body');
    if (!entries.length) { body.innerHTML = '<div class="history-empty">No downloads yet</div>'; return; }
    body.innerHTML = entries.slice(0, 100).map(e => {
      const d  = new Date(e.timestamp);
      const ts = d.toLocaleDateString('en', { day:'2-digit', month:'short' }) + ' ' +
                 d.toLocaleTimeString('en', { hour:'2-digit', minute:'2-digit', hour12: false });
      const title  = e.title || e.url || '?';
      const artist = e.artist ? ` · ${e.artist}` : '';
      const src    = e.source === 'tidal' ? '🎵' : '▶';
      const folder = e.folder ? e.folder.split('/').pop() : '';
      return `<div class="history-item">
        <div class="history-title">${src} ${title}</div>
        <div class="history-meta">${ts}${artist}${folder ? ' · ' + folder : ''}</div>
      </div>`;
    }).join('');
  }

  async function clearHistory() {
    if (!confirm('Clear download history?')) return;
    await fetch('/api/history/clear', { method: 'POST' });
    loadHistory();
  }

  // ── yt-dlp Update ─────────────────────────────────────────────────────────────
  async function runUpdate() {
    clearLog();
    document.getElementById('t-label').textContent = 'yt-dlp update';
    setStatus('running', '⟳ Updating yt-dlp…');
    const res = await fetch('/api/update-ytdlp', { method: 'POST' });
    const reader  = res.body.getReader();
    const decoder = new TextDecoder();
    let buf = '';
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += decoder.decode(value, { stream: true });
      const lines = buf.split('\n'); buf = lines.pop();
      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        let m; try { m = JSON.parse(line.slice(6)); } catch { continue; }
        if (m.type === 'log')   log(m.text);
        if (m.type === 'done')  { log(m.text, 'ok'); setStatus('done', m.text); }
        if (m.type === 'error') { log(m.text, 'err'); setStatus('error', m.text); }
      }
    }
  }
</script>
