<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>yt-dlp Downloader</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@400;600&display=swap');

  :root {
    --bg:           #f5f5f0;
    --surface:      #ffffff;
    --border:       #d8d8d0;
    --accent:       #1a1a2e;
    --accent-light: #e8e8f8;
    --tidal:        #00595e;
    --tidal-light:  #e0f4f5;
    --green:        #1a7a4a;
    --green-bg:     #e8f5ee;
    --red:          #b91c1c;
    --red-bg:       #fef2f2;
    --text:         #1a1a1a;
    --muted:        #888880;
    --mono: 'IBM Plex Mono', monospace;
    --sans: 'IBM Plex Sans', sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    font-family: var(--sans);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 4rem 1rem 3rem;
  }

  .wrap { width: 100%; max-width: 860px; }

  header {
    margin-bottom: 2.5rem;
    border-left: 3px solid var(--accent);
    padding-left: 1rem;
  }

  h1 { font-family: var(--mono); font-size: 1.4rem; font-weight: 600; letter-spacing: -.02em; color: var(--accent); }
  .sub { font-family: var(--mono); font-size: .72rem; color: var(--muted); margin-top: .25rem; }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 1.75rem;
    margin-bottom: 1rem;
    transition: border-color .2s;
  }

  .card.tidal-mode { border-color: var(--tidal); }

  .field { margin-bottom: 1.25rem; }
  .field:last-child { margin-bottom: 0; }

  label {
    display: block;
    font-family: var(--mono);
    font-size: .68rem;
    font-weight: 600;
    letter-spacing: .08em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: .5rem;
  }

  input[type="url"], input[type="text"], input[type="search"] {
    width: 100%;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: .7rem .875rem;
    font-family: var(--mono);
    font-size: .85rem;
    color: var(--text);
    background: var(--bg);
    outline: none;
    transition: border-color .15s, box-shadow .15s;
  }

  input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-light); }
  input::placeholder { color: var(--muted); }

  /* Mode selector */
  .mode-row {
    display: flex;
    gap: .5rem;
    margin-bottom: 1.5rem;
  }

  .mode-btn {
    flex: 1;
    padding: .55rem .5rem;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    font-family: var(--mono);
    font-size: .75rem;
    font-weight: 600;
    color: var(--muted);
    cursor: pointer;
    text-align: center;
    transition: all .15s;
  }

  .mode-btn:hover { border-color: var(--accent); color: var(--text); }

  .mode-btn.active[data-mode="auto"] {
    border-color: var(--accent);
    background: var(--accent);
    color: #fff;
  }

  .mode-btn.active[data-mode="tidal"] {
    border-color: var(--tidal);
    background: var(--tidal);
    color: #fff;
  }

  .mode-btn.active[data-mode="ytdlp"] {
    border-color: var(--red);
    background: var(--red);
    color: #fff;
  }

  .mode-desc {
    font-family: var(--mono);
    font-size: .68rem;
    color: var(--muted);
    margin-bottom: 1.25rem;
    padding: .5rem .75rem;
    background: var(--bg);
    border-radius: 6px;
    border-left: 3px solid var(--border);
    transition: border-color .2s;
  }

  .mode-desc.tidal-mode { border-color: var(--tidal); color: var(--tidal); background: var(--tidal-light); }

  /* Two-column folder layout */
  .folder-row {
    display: grid;
    grid-template-columns: auto 1fr;
    gap: 1rem;
    align-items: start;
  }

  .dir-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: .5rem;
    min-width: 180px;
  }

  .dir-btn {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: .55rem .75rem;
    font-family: var(--mono);
    font-size: .78rem;
    color: var(--muted);
    cursor: pointer;
    text-align: left;
    transition: border-color .15s, color .15s, background .15s;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .dir-btn:hover { border-color: var(--accent); color: var(--text); }
  .dir-btn.active { border-color: var(--accent); background: var(--accent); color: #fff; }

  /* Track list */
  .tracklist {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
  }

  .tracklist-header {
    padding: .4rem .75rem;
    font-family: var(--mono);
    font-size: .65rem;
    font-weight: 600;
    letter-spacing: .08em;
    text-transform: uppercase;
    color: var(--muted);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .track-count {
    background: var(--border);
    border-radius: 10px;
    padding: .1rem .45rem;
    font-size: .62rem;
  }

  .tracklist-body { max-height: 220px; overflow-y: auto; padding: .35rem 0; }
  .tracklist-body::-webkit-scrollbar { width: 4px; }
  .tracklist-body::-webkit-scrollbar-track { background: transparent; }
  .tracklist-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .track-item {
    padding: .3rem .75rem;
    font-family: var(--mono);
    font-size: .72rem;
    color: var(--text);
    line-height: 1.4;
    word-break: break-word;
  }

  .track-empty, .track-loading {
    padding: .75rem;
    font-family: var(--mono);
    font-size: .72rem;
    color: var(--muted);
    text-align: center;
    font-style: italic;
  }

  /* Primary button */
  button.primary {
    width: 100%;
    margin-top: 1.5rem;
    padding: .8rem 1rem;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 6px;
    font-family: var(--mono);
    font-size: .88rem;
    font-weight: 600;
    cursor: pointer;
    letter-spacing: .02em;
    transition: background .2s, opacity .15s, transform .1s;
  }

  button.primary.tidal-mode { background: var(--tidal); }
  button.primary.ytdlp-mode { background: var(--red); }
  button.primary:hover { opacity: .88; }
  button.primary:active { transform: scale(.99); }
  button.primary:disabled { opacity: .4; cursor: not-allowed; }

  /* Terminal */
  .terminal { background: var(--accent); border-radius: 8px; overflow: hidden; display: none; margin-bottom: 1rem; }
  .terminal.show { display: block; }

  .t-bar { background: rgba(255,255,255,.07); padding: .55rem 1rem; display: flex; align-items: center; gap: .75rem; }
  .t-title { font-family: var(--mono); font-size: .7rem; color: rgba(255,255,255,.45); flex: 1; }

  .btn-cancel {
    background: transparent;
    border: 1px solid rgba(255,255,255,.25);
    color: rgba(255,255,255,.6);
    border-radius: 4px;
    padding: .2rem .55rem;
    font-family: var(--mono);
    font-size: .68rem;
    cursor: pointer;
    transition: border-color .15s, color .15s;
  }
  .btn-cancel:hover { border-color: rgba(255,100,100,.6); color: rgba(255,150,150,1); }

  .t-body {
    padding: .875rem 1rem 1rem;
    max-height: 320px;
    overflow-y: auto;
    font-family: var(--mono);
    font-size: .76rem;
    line-height: 1.75;
    color: rgba(255,255,255,.55);
    white-space: pre-wrap;
    word-break: break-all;
  }
  .t-body::-webkit-scrollbar { width: 4px; }
  .t-body::-webkit-scrollbar-track { background: transparent; }
  .t-body::-webkit-scrollbar-thumb { background: rgba(255,255,255,.15); border-radius: 2px; }

  .ll { animation: fl .12s ease both; }
  @keyframes fl { from { opacity:0; } to { opacity:1; } }
  .ll.ok  { color: #6ee7a0; }
  .ll.err { color: #fca5a5; }
  .ll.inf { color: #93c5fd; }

  /* Status */
  .status { font-family: var(--mono); font-size: .78rem; padding: .6rem .875rem; border-radius: 6px; display: none; margin-bottom: 1rem; }
  .status.show    { display: block; }
  .status.running { background: var(--accent-light); color: var(--accent); }
  .status.done    { background: var(--green-bg);     color: var(--green); }
  .status.error   { background: var(--red-bg);       color: var(--red); }

  /* Quality selector */
  .quality-row {
    display: flex;
    gap: .4rem;
    margin-top: 1rem;
  }

  .quality-btn {
    flex: 1;
    padding: .4rem .4rem;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    font-family: var(--mono);
    font-size: .7rem;
    font-weight: 600;
    color: var(--muted);
    cursor: pointer;
    text-align: center;
    transition: all .15s;
  }

  .quality-btn:hover { border-color: var(--tidal); color: var(--text); }
  .quality-btn.active { border-color: var(--tidal); background: var(--tidal); color: #fff; }

  .quality-wrap { display: none; }
  .quality-wrap.visible { display: block; }

  /* Preview card */
  .preview-card {
    background: var(--surface);
    border: 1px solid var(--tidal);
    border-radius: 8px;
    padding: 1.25rem 1.5rem;
    margin-bottom: 1rem;
    display: none;
  }

  .preview-card.show { display: block; }

  .preview-title {
    font-family: var(--sans);
    font-size: 1rem;
    font-weight: 600;
    color: var(--text);
    margin-bottom: .25rem;
  }

  .preview-artist {
    font-family: var(--mono);
    font-size: .78rem;
    color: var(--muted);
    margin-bottom: .75rem;
  }

  .preview-meta {
    display: flex;
    gap: 1.5rem;
    font-family: var(--mono);
    font-size: .75rem;
    color: var(--text);
    margin-bottom: 1rem;
  }

  .preview-meta span b { color: var(--tidal); }

  .preview-btns {
    display: flex;
    gap: .5rem;
  }

  .btn-confirm {
    flex: 1;
    padding: .65rem;
    background: var(--tidal);
    color: #fff;
    border: none;
    border-radius: 6px;
    font-family: var(--mono);
    font-size: .82rem;
    font-weight: 600;
    cursor: pointer;
    transition: opacity .15s;
  }

  .btn-confirm:hover { opacity: .85; }

  .btn-reject {
    padding: .65rem 1rem;
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
    border-radius: 6px;
    font-family: var(--mono);
    font-size: .82rem;
    cursor: pointer;
    transition: border-color .15s, color .15s;
  }

  .btn-reject:hover { border-color: var(--red); color: var(--red); }

  footer { margin-top: 2rem; font-family: var(--mono); font-size: .65rem; color: var(--muted); text-align: center; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>yt-dlp_linux</h1>
    <div class="sub">yt-dlp · Tidal (hifi-api) · Nextcloud Sync</div>
  </header>

  <div class="card" id="main-card">

    <!-- Mode selector -->
    <div class="field">
      <label>Modus</label>
      <div class="mode-row" id="mode-row">
        <button class="mode-btn active" data-mode="auto">⚡ Auto</button>
        <button class="mode-btn" data-mode="tidal">🎵 Tidal</button>
        <button class="mode-btn" data-mode="ytdlp">▶ yt-dlp</button>
      </div>
      <div class="mode-desc" id="mode-desc">
        Auto: Titel von YouTube abrufen → auf Tidal suchen → bei Erfolg FLAC, sonst yt-dlp Fallback
      </div>
    </div>

    <!-- Quality selector (Tidal/Auto only) -->
    <div class="quality-wrap visible" id="quality-wrap">
      <label>Qualität (Tidal)</label>
      <div class="quality-row" id="quality-row">
        <button class="quality-btn" data-quality="HI_RES_LOSSLESS" title="bis 24-bit/192kHz FLAC">Hi-Res FLAC</button>
        <button class="quality-btn active" data-quality="LOSSLESS" title="16-bit/44.1kHz FLAC">FLAC</button>
        <button class="quality-btn" data-quality="HIGH" title="320kbps AAC">AAC 320</button>
        <button class="quality-btn" data-quality="LOW" title="96kbps AAC">AAC 96</button>
      </div>
    </div>

    <!-- URL / Search field -->
    <div class="field">
      <label id="url-label">YouTube URL</label>
      <input type="url" id="url" placeholder="https://www.youtube.com/watch?v=…" autocomplete="off" spellcheck="false">
    </div>

    <!-- Folder + Tracklist -->
    <div class="field">
      <label>Zielordner &amp; Tracks</label>
      <div class="folder-row">
        <div class="dir-grid" id="dir-grid">
          <button class="dir-btn active" data-folder="80s banger neu">80s banger neu</button>
          <button class="dir-btn" data-folder="Pop">Pop</button>
          <button class="dir-btn" data-folder="Rock">Rock</button>
          <button class="dir-btn" data-folder="ht">ht</button>
          <button class="dir-btn" data-folder="DnB">DnB</button>
          <button class="dir-btn" data-folder="Rap">Rap</button>
          <button class="dir-btn" data-folder="gym">gym</button>
          <button class="dir-btn" data-folder="uffe fresse">uffe fresse</button>
        </div>
        <div class="tracklist" id="tracklist">
          <div class="tracklist-header">
            <span>Tracks</span>
            <span class="track-count" id="track-count">—</span>
          </div>
          <div class="tracklist-body" id="tracklist-body">
            <div class="track-loading">Lädt…</div>
          </div>
        </div>
      </div>
    </div>

    <button class="primary" id="dl-btn" onclick="go()">⬇ Download starten</button>
  </div>

  <div class="preview-card" id="preview-card">
    <div class="preview-title" id="preview-title"></div>
    <div class="preview-artist" id="preview-artist"></div>
    <div class="preview-meta">
      <span>⏱ <b id="preview-duration"></b></span>
      <span>💾 <b id="preview-size"></b> MB</span>
      <span>🎵 <b id="preview-quality"></b></span>
    </div>
    <div class="preview-btns">
      <button class="btn-confirm" onclick="confirmDownload()">⬇ Herunterladen</button>
      <button class="btn-reject" onclick="rejectDownload()">✕ Abbrechen</button>
    </div>
  </div>

  <div class="status" id="status"></div>

  <div class="terminal" id="term">
    <div class="t-bar">
      <span class="t-title" id="t-label">output</span>
      <button class="btn-cancel" onclick="abort()">■ Abbrechen</button>
    </div>
    <div class="t-body" id="t-body"></div>
  </div>

  <footer>localhost:5000</footer>
</div>

<script>
  let jobId = null, evt = null;
  let musikDir     = '/musik';
  let selectedDir  = '/musik/80s banger neu';
  let selectedMode = 'auto';

  // Load base music dir from server config
  fetch('/api/config').then(r => r.json()).then(cfg => {
    musikDir = cfg.musik_dir.replace(/\/+$/, '');
    selectedDir = musikDir + '/80s banger neu';
    // Update all button paths
    document.querySelectorAll('.dir-btn').forEach(btn => {
      btn.dataset.path = musikDir + '/' + btn.dataset.folder;
    });
    loadTracks(selectedDir);
  });

  let selectedQuality = 'LOSSLESS';

  // Quality button selection
  document.getElementById('quality-row').addEventListener('click', e => {
    const btn = e.target.closest('.quality-btn');
    if (!btn) return;
    document.querySelectorAll('.quality-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    selectedQuality = btn.dataset.quality;
  });

  const modeConfig = {
    auto: {
      desc: 'Auto: Titel von YouTube abrufen → auf Tidal suchen → bei Erfolg FLAC, sonst yt-dlp Fallback',
      urlLabel: 'YouTube URL',
      placeholder: 'https://www.youtube.com/watch?v=…',
      inputType: 'url',
      btnText: '⬇ Download starten',
      tidal: false,
    },
    tidal: {
      desc: 'Tidal: Direkt auf Tidal suchen und als FLAC herunterladen (benötigt hifi-api)',
      urlLabel: 'Tidal Suche',
      placeholder: 'Künstler – Titel …',
      inputType: 'search',
      btnText: '🎵 Von Tidal laden',
      tidal: true,
    },
    ytdlp: {
      desc: 'yt-dlp: Direkt von YouTube / anderen Plattformen als Opus herunterladen',
      urlLabel: 'YouTube URL',
      placeholder: 'https://www.youtube.com/watch?v=…',
      inputType: 'url',
      btnText: '▶ Mit yt-dlp laden',
      tidal: false,
    }
  };

  // Mode button selection
  document.getElementById('mode-row').addEventListener('click', e => {
    const btn = e.target.closest('.mode-btn');
    if (!btn) return;
    selectedMode = btn.dataset.mode;
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    applyMode();
  });

  function applyMode() {
    const cfg = modeConfig[selectedMode];
    const card    = document.getElementById('main-card');
    const desc    = document.getElementById('mode-desc');
    const urlLbl  = document.getElementById('url-label');
    const urlInp  = document.getElementById('url');
    const dlBtn   = document.getElementById('dl-btn');

    desc.textContent = cfg.desc;
    urlLbl.textContent = cfg.urlLabel;
    urlInp.placeholder = cfg.placeholder;
    urlInp.type = cfg.inputType;
    dlBtn.textContent = cfg.btnText;

    // Show quality selector for tidal and auto modes
    const qwrap = document.getElementById('quality-wrap');
    if (selectedMode === 'tidal' || selectedMode === 'auto') {
      qwrap.classList.add('visible');
    } else {
      qwrap.classList.remove('visible');
    }

    if (cfg.tidal) {
      card.classList.add('tidal-mode');
      desc.classList.add('tidal-mode');
      dlBtn.className = 'primary tidal-mode';
    } else {
      card.classList.remove('tidal-mode');
      desc.classList.remove('tidal-mode');
      dlBtn.className = selectedMode === 'ytdlp' ? 'primary ytdlp-mode' : 'primary';
    }
  }

  // Dir button selection
  document.getElementById('dir-grid').addEventListener('click', e => {
    const btn = e.target.closest('.dir-btn');
    if (!btn) return;
    document.querySelectorAll('.dir-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    selectedDir = musikDir + '/' + btn.dataset.folder;
    loadTracks(selectedDir);
    applyMode();
  });

  async function loadTracks(path) {
    const body  = document.getElementById('tracklist-body');
    const count = document.getElementById('track-count');
    body.innerHTML = '<div class="track-loading">Lädt…</div>';
    count.textContent = '—';
    try {
      const res  = await fetch('/api/files?path=' + encodeURIComponent(path));
      const data = await res.json();
      if (data.error || !data.files.length) {
        body.innerHTML = '<div class="track-empty">Keine Tracks gefunden</div>';
        count.textContent = '0';
        return;
      }
      count.textContent = data.files.length;
      body.innerHTML = data.files.map(f => `<div class="track-item">${f}</div>`).join('');
    } catch {
      body.innerHTML = '<div class="track-empty">Fehler beim Laden</div>';
    }
  }

  loadTracks(selectedDir);

  function setStatus(cls, txt) {
    const el = document.getElementById('status');
    el.className = 'status show ' + cls;
    el.textContent = txt;
  }

  function log(txt, cls='') {
    const b = document.getElementById('t-body');
    const d = document.createElement('div');
    d.className = 'll' + (cls ? ' '+cls : '');
    d.textContent = txt;
    b.appendChild(d);
    b.scrollTop = b.scrollHeight;
  }

  let previewEvt = null;

  async function go() {
    const url = document.getElementById('url').value.trim();
    if (!url) { alert('Bitte eine URL oder Suchanfrage eingeben.'); return; }

    if (selectedMode === 'ytdlp') { startDownload(); return; }

    document.getElementById('dl-btn').disabled = true;
    document.getElementById('preview-card').classList.remove('show');
    setStatus('running', '🔍 Suche…');

    const res = await fetch('/api/preview', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ url, mode: selectedMode, quality: selectedQuality })
    });

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buf = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += decoder.decode(value, { stream: true });
      const lines = buf.split('\n');
      buf = lines.pop();
      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        let m;
        try { m = JSON.parse(line.slice(6)); } catch { continue; }

        if (m.type === 'status') {
          setStatus('running', m.text);
        } else if (m.type === 'skip') {
          document.getElementById('dl-btn').disabled = false;
          setStatus('', '');
          startDownload();
          return;
        } else if (m.type === 'fallback') {
          setStatus('running', m.text);
          document.getElementById('dl-btn').disabled = false;
          startDownload();
          return;
        } else if (m.type === 'error') {
          document.getElementById('dl-btn').disabled = false;
          setStatus('error', m.text);
          return;
        } else if (m.type === 'result') {
          document.getElementById('dl-btn').disabled = false;
          document.getElementById('preview-title').textContent = m.title;
          document.getElementById('preview-artist').textContent = m.artist;
          document.getElementById('preview-duration').textContent = m.duration;
          document.getElementById('preview-size').textContent = m.size_mb;
          document.getElementById('preview-quality').textContent = m.quality;
          document.getElementById('preview-card').classList.add('show');
          setStatus('', '');
        }
      }
    }
  }

  function confirmDownload() {
    document.getElementById('preview-card').classList.remove('show');
    startDownload();
  }

  function rejectDownload() {
    document.getElementById('preview-card').classList.remove('show');
    setStatus('', '');
  }

  async function startDownload() {
    const url = document.getElementById('url').value.trim();

    document.getElementById('t-body').innerHTML = '';
    document.getElementById('term').className = 'terminal show';
    document.getElementById('dl-btn').disabled = true;
    document.getElementById('t-label').textContent = `[${selectedMode}] ${selectedDir}`;
    setStatus('running', '⏳ Lädt herunter …');

    const res = await fetch('/api/download', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ url, output_dir: selectedDir, mode: selectedMode, quality: selectedQuality })
    });
    const data = await res.json();

    if (data.error) { log('❌ '+data.error, 'err'); setStatus('error', data.error); done(); return; }

    jobId = data.job_id;
    log('Job ' + jobId + ' · Modus: ' + selectedMode + ' → ' + selectedDir, 'inf');

    evt = new EventSource('/api/stream/' + jobId);
    evt.onmessage = e => {
      const m = JSON.parse(e.data);
      if (m.type === 'log')   log(m.text);
      if (m.type === 'done')  { log(m.text, 'ok'); setStatus('done', '✅ Fertig!'); }
      if (m.type === 'error') { log(m.text, 'err'); setStatus('error', 'Fehler.'); }
      if (m.type === 'end')   { evt.close(); loadTracks(selectedDir); done(); }
    };
    evt.onerror = () => { log('Verbindung unterbrochen.', 'err'); setStatus('error', 'Verbindungsfehler.'); done(); };
  }

  function done() {
    document.getElementById('dl-btn').disabled = false;
    if (evt) { evt.close(); evt = null; }
    jobId = null;
  }

  async function abort() {
    if (!jobId) return;
    await fetch('/api/cancel/'+jobId, {method:'POST'});
    log('⚠ Abgebrochen.', 'err');
    setStatus('error', 'Abgebrochen.');
    done();
  }
</script>
</body>
